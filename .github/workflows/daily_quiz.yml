name: 毎日クイズ生成

on:
  schedule:
    - cron: '0 3 * * *'  # 毎日 3:00 UTC = 12:00 JST
  workflow_dispatch:       # GitHub上からも手動実行可能

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install groq requests python-dotenv

      - name: クイズページを生成
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          PAGES_BASE_URL: https://kawakanpa.github.io/line-quiz-bot
          APPS_SCRIPT_NOTIFY_URL: ${{ secrets.APPS_SCRIPT_NOTIFY_URL }}
          APPS_SCRIPT_NOTIFY_SECRET: ${{ secrets.APPS_SCRIPT_NOTIFY_SECRET }}
        run: python generate_quiz_page.py

      - name: 生成したHTMLをコミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "quiz: $(date -u +%Y-%m-%d) のクイズページを追加"
          git push
