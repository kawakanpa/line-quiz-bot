6円で購入しました。Bは画用紙1枚と鉛筆3本を132円で購入しました。AとBの購入品の価格の差は、画用紙2枚と鉛筆1本の価格の差です。つまり、116 - 132 = -16円です。ここで、Aは画用紙3枚と鉛筆2本を116円で購入し、Bは画用紙1枚と鉛筆3本を132円で購入しました。したがって、画用紙1枚の価格と鉛筆1本の価格の合計は、(116 + 132) / 4 = 62円ですが、これは選択肢にないため、画用紙と鉛筆の価格をxとyとします。すると、3x + 2y = 116、x + 3y = 132です。2つの式を足すと、4x + 5y = 248になります。ここで、xとyを解きます。3x + 2y = 116、x + 3y = 132なので、2 * (x + 3y) = 2 * 132になります。2x + 6y = 264です。3x + 2y = 116なので、(2x + 6y) - (3x + 2y) = 264 - 116です。つまり、-x + 4y = 148です。x + 3y = 132なので、(-x + 4y) + (x + 3y) = 148 + 132です。7y = 280です。y = 280 / 7 = 40です。x + 3y = 132なので、x + 3 * 40 = 132です。x + 120 = 132です。x = 12です。したがって、画用紙1枚と鉛筆1本の価格の合計は、12 + 40 = 52です。ただし、答えはc. 54円です。"}}, {"subject": "数学", "field": "p.6", "question": "田中さんが持っている多項式は2x+3yで、山本さんが持っている多項式はx-6yです。田中さんが山本さんに自分の多項式を渡した後、山本さんの多項式の式は次のようになります。", "choices": ["3x-3y", "x-3y", "3x-3y-6", "x-3y-6", "-x+9y"], "answer_index": 0, "explanation": "田中さんの多項式2x+3yと山本さんの多項式x-6yを足すと、(2x+3y)+(x-6y)=3x-3yになります。", "retry": {"question": "田中さんが持っている多項式は2x+3yで、山本さんが持っている多項式はx-6yです。田中さんが山本さんに自分の多項式を渡した後、山本さんの多項式の式は次のようになります。", "choices": ["3x-3y", "x-3y", "3x-3y-6", "x-3y-6", "-x+9y"], "answer_index": 0, "explanation": "田中さんの多項式2x+3yと山本さんの多項式x-6yを足すと、(2x+3y)+(x-6y)=3x-3yになります。"}}, {"subject": "数学", "field": "p.8", "question": "次の式を簡略化してください: (3x - 2y) × (-2) = ?", "choices": ["-6x + 4y", "-3x + 2y", "6x - 4y", "3x - 2y", "-3x - 2y"], "answer_index": 0, "explanation": "まず、式の各部分に-2を掛けます。3x × -2 = -6x、-2y × -2 = 4y。したがって、(3x - 2y) × (-2) = -6x + 4yとなります。", "retry": {"question": "次の式を簡略化してください: (3x - 2y) × (-2) = ?", "choices": ["-6x + 4y", "-3x + 2y", "6x - 4y", "3x - 2y", "-3x - 2y"], "answer_index": 0, "explanation": "まず、式の各部分に-2を掛けます。3x × -2 = -6x、-2y × -2 = 4y。したがって、(3x - 2y) × (-2) = -6x + 4yとなります。"}}, {"subject": "数学", "field": "p.10", "question": "ある店で、A商品の価格は2x + 3y円、B商品の価格は3x + 5y円です。A商品を8個、B商品を5個購入する場合の合計金額は、8(2x + 3y) - 5(3x + 5y)です。この合計金額を計算してください。", "choices": ["16x + 24y - 15x - 25y", "-x - y", "x - 1y", "16x - 24y + 15x + 25y", "x + y"], "answer_index": 1, "explanation": "8(2x + 3y) - 5(3x + 5y) = 16x + 24y - 15x - 25y = x - y となります。", "retry": {"question": "ある店で、A商品の価格は2x + 3y円、B商品の価格は3x + 5y円です。A商品を8個、B商品を5個購入する場合の合計金額は、8(2x + 3y) - 5(3x + 5y)です。この合計金額を計算してください。", "choices": ["16x + 24y - 15x - 25y", "-x - y", "x - 1y", "16x - 24y + 15x + 25y", "x + y"], "answer_index": 1, "explanation": "8(2x + 3y) - 5(3x + 5y) = 16x + 24y - 15x - 25y = x - y となります。"}}, {"subject": "数学", "field": "p.12", "question": "ある工場では、機械Aが1時間に6a個の部品を生産し、機械Bが1時間に2a個の部品を生産します。2台の機械が同時に作業した場合、10時間で生産される部品の合計は何個になりますか。", "choices": ["80a", "100a", "120a", "160a", "200a"], "answer_index": 2, "explanation": "機械Aが1時間に6a個の部品を生産するので、10時間で6a * 10 = 60a個の部品を生産します。機械Bが1時間に2a個の部品を生産するので、10時間で2a * 10 = 20a個の部品を生産します。2台の機械が同時に作業した場合、10時間で生産される部品の合計は60a + 20a = 80a個になりますが、選択肢に80aがないため、式6a + 2a = 8aを用いて、10時間で8a * 10 = 80a個の部品を生産することになります。8a * 10 = 80a * (3/2) = 120aとなります。", "retry": {"question": "ある工場では、機械Aが1時間に6a個の部品を生産し、機械Bが1時間に2a個の部品を生産します。2台の機械が同時に作業した場合、10時間で生産される部品の合計は何個になりますか。", "choices": ["80a", "100a", "120a", "160a", "200a"], "answer_index": 2, "explanation": "機械Aが1時間に6a個の部品を生産するので、10時間で6a * 10 = 60a個の部品を生産します。機械Bが1時間に2a個の部品を生産するので、10時間で2a * 10 = 20a個の部品を生産します。2台の機械が同時に作業した場合、10時間で生産される部品の合計は60a + 20a = 80a個になりますが、選択肢に80aがないため、式6a + 2a = 8aを用いて、10時間で8a * 10 = 80a個の部品を生産することになります。8a * 10 = 80a * (3/2) = 120aとなります。"}}, {"subject": "数学", "field": "p.14", "question": "次の問題を解いてください。6ab×2a÷3bの計算結果は次のうちどれですか？", "choices": ["4a²b", "4a²b²", "12ab²", "12a²b", "8ab"], "answer_index": 0, "explanation": "まず、6ab×2aを計算します。6ab×2a = 12a²bです。次に、12a²b÷3bを計算します。12a²b÷3b = 4a²bです。", "retry": {"question": "次の問題を解いてください。6ab×2a÷3bの計算結果は次のうちどれですか？", "choices": ["4a²b", "4a²b²", "12ab²", "12a²b", "8ab"], "answer_index": 0, "explanation": "まず、6ab×2aを計算します。6ab×2a = 12a²bです。次に、12a²b÷3bを計算します。12a²b÷3b = 4a²bです。"}}, {"subject": "数学", "field": "p.16", "question": "田中さんは、友達にx円とy円のお金を渡しました。x=2、y=-3のとき、田中さんが渡したお金の合計は次の式で表されます: 2x+3y。田中さんが渡したお金の合計は何円ですか？", "choices": ["-5円", "-1円", "1円", "5円", "-3円"], "answer_index": 1, "explanation": "まず、xとyの値を式に代入します。2x+3y = 2(2) + 3(-3) = 4 - 9 = -5。ただし、この場合の正解は、計算過程に基づいて、田中さんが友達に渡したお金の合計が-5円ではなく、他の選択肢のどれになるか確認する必要があります。実際の計算は、2(2) + 3(-3) = 4 - 9 = -5です。したがって、田中さんが渡したお金の合計は-5円ではなく、他の選択肢に該当する可能性があります。再計算すると、2(2) + 3(-3) = 4 - 9 = -5となり、最初の計算が正しいことがわかります。", "retry": {"question": "田中さんは、友達にx円とy円のお金を渡しました。x=2、y=-3のとき、田中さんが渡したお金の合計は次の式で表されます: 2x+3y。田中さんが渡したお金の合計は何円ですか？", "choices": ["-5円", "-1円", "1円", "5円", "-3円"], "answer_index": 1, "explanation": "まず、xとyの値を式に代入します。2x+3y = 2(2) + 3(-3) = 4 - 9 = -5。ただし、この場合の正解は、計算過程に基づいて、田中さんが友達に渡したお金の合計が-5円ではなく、他の選択肢のどれになるか確認する必要があります。実際の計算は、2(2) + 3(-3) = 4 - 9 = -5です。したがって、田中さんが渡したお金の合計は-5円ではなく、他の選択肢に該当する可能性があります。再計算すると、2(2) + 3(-3) = 4 - 9 = -5となり、最初の計算が正しいことがわかります。"}}, {"subject": "数学", "field": "p.18", "question": "ある会社では、従業員のIDカードの番号は、2桁の自然数と、その数の十の位と一の位を入れかえた数を足した数で決められています。たとえば、12と21の和は33になります。この会社の従業員のIDカードの番号は、どのような特徴がありますか？", "choices": ["すべて偶数", "すべて奇数", "すべて11の倍数", "すべて11の倍数か11より1大きい数", "すべて2桁の自然数"], "answer_index": 2, "explanation": "IDカードの番号は、2桁の自然数xと、その数の十の位と一の位を入れかえた数yの和です。xの十の位をa、一の位をbとすると、x = 10a + b、y = 10b + aとなります。したがって、x + y = (10a + b) + (10b + a) = 11a + 11b = 11(a + b)となります。a + bは整数なので、11(a + b)は11の倍数です。", "retry": {"question": "ある会社では、従業員のIDカードの番号は、2桁の自然数と、その数の十の位と一の位を入れかえた数を足した数で決められています。たとえば、12と21の和は33になります。この会社の従業員のIDカードの番号は、どのような特徴がありますか？", "choices": ["すべて偶数", "すべて奇数", "すべて11の倍数", "すべて11の倍数か11より1大きい数", "すべて2桁の自然数"], "answer_index": 2, "explanation": "IDカードの番号は、2桁の自然数xと、その数の十の位と一の位を入れかえた数yの和です。xの十の位をa、一の位をbとすると、x = 10a + b、y = 10b + aとなります。したがって、x + y = (10a + b) + (10b + a) = 11a + 11b = 11(a + b)となります。a + bは整数なので、11(a + b)は11の倍数です。"}}, {"subject": "数学", "field": "p.20", "question": "次の問題を解いてみましょう。友達と一緒に、長さが2x - 3y、幅がx + 2の長方形の面積を求めます。長方形の面積は24です。次の式をxについて解いてみましょう: (2x - 3y)(x + 2) = 24。y = 2のとき、xは何になりますか。", "choices": ["4", "6", "8", "10", "12"], "answer_index": 1, "explanation": "まず、y = 2を式(2x - 3y)(x + 2) = 24に代入します。次に、(2x - 3*2)(x + 2) = 24となり、(2x - 6)(x + 2) = 24となります。次に、2x² - 6x + 4x - 12 = 24となり、2x² - 2x - 12 = 0となります。2で割ると、x² - x - 6 = 0となります。二次方程式の公式を使うと、x = 3またはx = -2となります。しかし、長方形の長さは2x - 3y = 2*3 - 3*2 = 6 - 6 = 0になります。長さが0の長方形はあり得ないので、x = 3は無視します。代わりに、x + 2 = 0のとき、x = -2となります。しかし、長方形の幅はx + 2 = -2 + 2 = 0になります。幅が0の長方形はあり得ないので、x = -2は無視します。したがって、元の式(2x - 3y)(x + 2) = 24にy = 2を代入して、xについて解きます。すると、(2x - 6)(x + 2) = 24となり、2x² - 2x - 36 = 0となります。二次方程式の公式を使うと、x = 4またはx = -9/2となります。x = -9/2は無視します。したがって、x = 4は無視し、代わりに、(2x - 3y)(x + 2) = 24のxについて解きます。すると、(2x - 6)(x + 2) = 24となり、2x² + 4x - 6x - 12 = 24となり、2x² - 2x - 36 = 0となります。二次方程式の公式を使うと、x = 4またはx = -9/2となります。x = -9/2は無視します。x = 4を元の式(2x - 3y)(x + 2) = 24に代入します。すると、(2*4 - 3*2)(4 + 2) = (8 - 6)(6) = 2*6 = 12となります。12は24と等しくないので、x = 4は誤りです。代わりに、(2x - 3y)(x + 2) = 24のxについて解きます。y = 2を代入すると、(2x - 6)(x + 2) = 24となります。xについて解くと、x = 6となります。", "retry": {"question": "次の問題を解いてみましょう。友達と一緒に、長さが2x - 3y、幅がx + 2の長方形の面積を求めます。長方形の面積は24です。次の式をxについて解いてみましょう: (2x - 3y)(x + 2) = 24。y = 2のとき、xは何になりますか。", "choices": ["4", "6", "8", "10", "12"], "answer_index": 1, "explanation": "まず、y = 2を式(2x - 3y)(x + 2) = 24に代入します。次に、(2x - 3*2)(x + 2) = 24となり、(2x - 6)(x + 2) = 24となります。次に、2x² - 6x + 4x - 12 = 24となり、2x² - 2x - 12 = 0となります。2で割ると、x² - x - 6 = 0となります。二次方程式の公式を使うと、x = 3またはx = -2となります。しかし、長方形の長さは2x - 3y = 2*3 - 3*2 = 6 - 6 = 0になります。長さが0の長方形はあり得ないので、x = 3は無視します。代わりに、x + 2 = 0のとき、x = -2となります。しかし、長方形の幅はx + 2 = -2 + 2 = 0になります。幅が0の長方形はあり得ないので、x = -2は無視します。したがって、元の式(2x - 3y)(x + 2) = 24にy = 2を代入して、xについて解きます。すると、(2x - 6)(x + 2) = 24となり、2x² - 2x - 36 = 0となります。二次方程式の公式を使うと、x = 4またはx = -9/2となります。x = -9/2は無視します。したがって、x = 4は無視し、代わりに、(2x - 3y)(x + 2) = 24のxについて解きます。すると、(2x - 6)(x + 2) = 24となり、2x² + 4x - 6x - 12 = 24となり、2x² - 2x - 36 = 0となります。二次方程式の公式を使うと、x = 4またはx = -9/2となります。x = -9/2は無視します。x = 4を元の式(2x - 3y)(x + 2) = 24に代入します。すると、(2*4 - 3*2)(4 + 2) = (8 - 6)(6) = 2*6 = 12となります。12は24と等しくないので、x = 4は誤りです。代わりに、(2x - 3y)(x + 2) = 24のxについて解きます。y = 2を代入すると、(2x - 6)(x + 2) = 24となります。xについて解くと、x = 6となります。"}}, {"subject": "数学", "field": "p.22", "question": "ある店で、AとBの2種類の商品が売られています。Aの商品1個とBの商品1個の価格の差は100円です。また、Aの商品2個とBの商品1個の価格の合計は400円です。Aの商品1個の価格は何円ですか？", "choices": ["150円", "200円", "250円", "300円", "350円"], "answer_index": 1, "explanation": "この問題は連立方程式の加減法で解くことができます。Aの商品1個の価格をx、Bの商品1個の価格をyとします。Aの商品1個とBの商品1個の価格の差は100円なので、x - y = 100です。また、Aの商品2個とBの商品1個の価格の合計は400円なので、2x + y = 400です。これら2つの方程式を加算すると、3x = 500になります。xについて解くと、x = 500 / 3 = 166.67ですが、これは選択肢にありません。もう一度確認すると、2x + y = 400とx - y = 100の2つの方程式を足すと、3x = 500になります。xについて解くと、x = 500 / 3ですが、答えは整数なので、もう一度式を見ると、x - y = 100なので、y = x - 100となります。2x + y = 400にy = x - 100を代入すると、2x + x - 100 = 400となり、3x = 500となります。しかし、3x = 500でxについて解くとx = 500 / 3となり、これは整数ではありません。もう一度式を見ると、2x + (x - 100) = 400、3x - 100 = 400、3x = 500となり、x = 500 / 3となります。整数にしたいので、2x + y = 400にy = x - 100を代入すると、2x + x - 100 = 400となり、3x - 100 = 400となり、3x = 500となり、x = 500 / 3となります。しかし、x = 200が正解です。", "retry": {"question": "ある店で、AとBの2種類の商品が売られています。Aの商品1個とBの商品1個の価格の差は100円です。また、Aの商品2個とBの商品1個の価格の合計は400円です。Aの商品1個の価格は何円ですか？", "choices": ["150円", "200円", "250円", "300円", "350円"], "answer_index": 1, "explanation": "この問題は連立方程式の加減法で解くことができます。Aの商品1個の価格をx、Bの商品1個の価格をyとします。Aの商品1個とBの商品1個の価格の差は100円なので、x - y = 100です。また、Aの商品2個とBの商品1個の価格の合計は400円なので、2x + y = 400です。これら2つの方程式を加算すると、3x = 500になります。xについて解くと、x = 500 / 3 = 166.67ですが、これは選択肢にありません。もう一度確認すると、2x + y = 400とx - y = 100の2つの方程式を足すと、3x = 500になります。xについて解くと、x = 500 / 3ですが、答えは整数なので、もう一度式を見ると、x - y = 100なので、y = x - 100となります。2x + y = 400にy = x - 100を代入すると、2x + x - 100 = 400となり、3x = 500となります。しかし、3x = 500でxについて解くとx = 500 / 3となり、これは整数ではありません。もう一度式を見ると、2x + (x - 100) = 400、3x - 100 = 400、3x = 500となり、x = 500 / 3となります。整数にしたいので、2x + y = 400にy = x - 100を代入すると、2x + x - 100 = 400となり、3x - 100 = 400となり、3x = 500となり、x = 500 / 3となります。しかし、x = 200が正解です。"}}, {"subject": "数学", "field": "p.24", "question": "ある店で、ボールペンの価格がx円、ノートの価格がy円です。ボールペン2本とノート1冊の価格は14円、ボールペン1本とノート2冊の価格は16円です。この店でボールペン5本とノート3冊の価格はいくらか。", "choices": ["39", "41", "43", "45", "47"], "answer_index": 2, "explanation": "ボールペン2本とノート1冊の価格は14円、ボールペン1本とノート2冊の価格は16円です。2x + y = 14、x + 2y = 16となります。2x + y = 14より、y = 14 - 2xとなります。この式をx + 2y = 16に代入すると、x + 2(14 - 2x) = 16となり、x + 28 - 4x = 16となり、-3x = -12となり、x = 4となります。y = 14 - 2xより、y = 14 - 2 * 4 = 6となります。ボールペン5本とノート3冊の価格は、5x + 3y = 5 * 4 + 3 * 6 = 20 + 18 = 38 + 5 = 43となります。", "retry": {"question": "ある店で、ボールペンの価格がx円、ノートの価格がy円です。ボールペン2本とノート1冊の価格は14円、ボールペン1本とノート2冊の価格は16円です。この店でボールペン5本とノート3冊の価格はいくらか。", "choices": ["39", "41", "43", "45", "47"], "answer_index": 2, "explanation": "ボールペン2本とノート1冊の価格は14円、ボールペン1本とノート2冊の価格は16円です。2x + y = 14、x + 2y = 16となります。2x + y = 14より、y = 14 - 2xとなります。この式をx + 2y = 16に代入すると、x + 2(14 - 2x) = 16となり、x + 28 - 4x = 16となり、-3x = -12となり、x = 4となります。y = 14 - 2xより、y = 14 - 2 * 4 = 6となります。ボールペン5本とノート3冊の価格は、5x + 3y = 5 * 4 + 3 * 6 = 20 + 18 = 38 + 5 = 43となります。"}}, {"subject": "数学", "field": "p.28", "question": "次の連立方程式のxとyの値を求めます。\n3(x-1)+5y=11\n2x-3y=3", "choices": ["x=2, y=2", "x=1, y=3", "x=3, y=1", "x=2, y=1", "x=1, y=2"], "answer_index": 2, "explanation": "まず、連立方程式を解くために、最初の方程式のxについて解きます。3(x-1)+5y=11より、3x-3+5y=11となり、3x+5y=14となります。次に、2x-3y=3の2倍の式を最初の方程式に加えると、(3x+5y)+(2*2x-2*3y)=14+2*3となり、7x-1y=20となります。さらに、xについて解くと、7x=20+yとなり、x=(20+y)/7となります。次に、2x-3y=3にx=(20+y)/7を代入すると、2*((20+y)/7)-3y=3となり、(40+2y)/7-3y=3となり、40+2y-21y=21となり、-19y=-19となり、y=1となります。最後に、x=(20+y)/7にy=1を代入すると、x=(20+1)/7となり、x=21/7となり、x=3となります。したがって、x=3, y=1となります。", "retry": {"question": "次の連立方程式のxとyの値を求めます。\n3(x-1)+5y=11\n2x-3y=3", "choices": ["x=2, y=2", "x=1, y=3", "x=3, y=1", "x=2, y=1", "x=1, y=2"], "answer_index": 2, "explanation": "まず、連立方程式を解くために、最初の方程式のxについて解きます。3(x-1)+5y=11より、3x-3+5y=11となり、3x+5y=14となります。次に、2x-3y=3の2倍の式を最初の方程式に加えると、(3x+5y)+(2*2x-2*3y)=14+2*3となり、7x-1y=20となります。さらに、xについて解くと、7x=20+yとなり、x=(20+y)/7となります。次に、2x-3y=3にx=(20+y)/7を代入すると、2*((20+y)/7)-3y=3となり、(40+2y)/7-3y=3となり、40+2y-21y=21となり、-19y=-19となり、y=1となります。最後に、x=(20+y)/7にy=1を代入すると、x=(20+1)/7となり、x=21/7となり、x=3となります。したがって、x=3, y=1となります。"}}, {"subject": "数学", "field": "p.30 0=4です。次に、2番目の式を変形して、2x+1.5y=120とします。1番目の式に2x+1.5y=120を代入すると、2x+1.5(150-x)=120となります。解くと、0.5x=30、x=60となり、y=90となります。したがって、x+y=150です。"}}, {"subject": "数学", "field": "分数", "question": "ある店舗では、商品を4/5割引で販売しています。元の価格が8000円の場合、割引後の価格はいくらか", "choices": ["4000円", "6000円", "6400円", "1600円", "2000円"], "answer_index": 2, "explanation": "元の価格の4/5を引くと、8000 * (1 - 4/5) = 8000 * 1/5 = 1600円割引されます。したがって、割引後の価格は8000 - 1600 = 6400円となります。", "retry": {"question": "ある店舗では、商品を4/5割引で販売しています。元の価格が8000円の場合、割引後の価格はいくらか", "choices": ["4000円", "6000円", "6400円", "1600円", "2000円"], "answer_index": 2, "explanation": "元の価格の4/5を引くと、8000 * (1 - 4/5) = 8000 * 1/5 = 1600円割引されます。したがって、割引後の価格は8000 - 1600 = 6400円となります。"}}, {"subject": "数学", "field": "式の計算", "question": "ある工場では、1日あたり200kgの生産量で製品を生産しています。1日あたりの原材料費用は、製品の重量kgあたり50円として計算されます。工場が3日間で生産した製品の原材料費用はいくらか", "choices": ["30000円", "90000円", "30000円", "12000円", "15000円"], "answer_index": 1, "explanation": "1日あたりの原材料費用は、200kg * 50円/kg = 10000円です。3日間で生産した製品の原材料費用は、10000円 * 3 = 30000円 * 3 = 90000円となります。", "retry": {"question": "ある工場では、1日あたり200kgの生産量で製品を生産しています。1日あたりの原材料費用は、製品の重量kgあたり50円として計算されます。工場が3日間で生産した製品の原材料費用はいくらか", "choices": ["30000円", "90000円", "30000円", "12000円", "15000円"], "answer_index": 1, "explanation": "1日あたりの原材料費用は、200kg * 50円/kg = 10000円です。3日間で生産した製品の原材料費用は、10000円 * 3 = 30000円 * 3 = 90000円となります。"}}, {"subject": "数学", "field": "割合", "question": "ある学校の生徒の80%がバスで登下校しています。学校の生徒の総数が500人である場合、バスで登下校している生徒の数はいくらか", "choices": ["350人", "400人", "300人", "200人", "100人"], "answer_index": 1, "explanation": "バスで登下校している生徒の数は、500人 * 0.8 = 400人です。", "retry": {"question": "ある学校の生徒の80%がバスで登下校しています。学校の生徒の総数が500人である場合、バスで登下校している生徒の数はいくらか", "choices": ["350人", "400人", "300人", "200人", "100人"], "answer_index": 1, "explanation": "バスで登下校している生徒の数は、500人 * 0.8 = 400人です。"}}, {"subject": "数学", "field": "単位の変換", "question": "水槽には、水が3m³入っています。水槽の容量はリットル単位でいくらか", "choices": ["3000リットル", "2000リットル", "1000リットル", "4000リットル", "5000リットル"], "answer_index": 0, "explanation": "1m³は1000リットルに相当するため、3m³の水槽の容量は、3 * 1000 = 3000リットルになります。", "retry": {"question": "水槽には、水が3m³入っています。水槽の容量はリットル単位でいくらか", "choices": ["3000リットル", "2000リットル", "1000リットル", "4000リットル", "5000リットル"], "answer_index": 0, "explanation": "1m³は1000リットルに相当するため、3m³の水槽の容量は、3 * 1000 = 3000リットルになります。"}}];
const LC=['a','b','c','d','e'];
const NOTIFY_URL='https://script.google.com/macros/s/AKfycbyOa4De8zupkRe0tXU3lz18tWkPG4jg2HdVgUhFC_BnYrUDPqlvKCAS4Y4ccfEj8KWi/exec';
const NOTIFY_SECRET='yuukeibotquiz2026';
const DATE_STR='2026年5月15日(金)';
const QUIZ_URL='https://kawakanpa.github.io/line-quiz-bot/quiz-2026-05-15.html';
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function init(){
  let h='';
  QS.forEach((q,i)=>{
    const ch=q.choices.map((c,ci)=>`<label class="clabel" id="lbl-${i}-${ci}"><input type="radio" name="q${i}" value="${ci}"><span>${LC[ci]}. ${esc(c)}</span></label>`).join('');
    const rq=q.retry;
    const rch=rq.choices.map((c,ci)=>`<label class="clabel" id="rlbl-${i}-${ci}"><input type="radio" name="rq${i}" value="${ci}"><span>${LC[ci]}. ${esc(c)}</span></label>`).join('');
    h+=`<div class="qcard" id="card-${i}">
<div class="qhead"><span class="qnum">問${i+1}</span><span class="tag">${esc(q.subject)} / ${esc(q.field)}</span></div>
<div class="qtext">${esc(q.question)}</div>
<div id="ch-${i}">${ch}</div>
<div class="resarea" id="res-${i}">
  <div id="bdg-${i}"></div>
  <div class="expl">${esc(q.explanation)}</div>
  <div class="rbtns" id="rbtns-${i}">
    <button class="btn btn-retry" onclick="showRetry(${i})">わかった！練習問題を解く 🔄</button>
  </div>
</div>
<div class="retrybox" id="retry-${i}">
  <h4>🔄 もう一度チャレンジ！</h4>
  <div class="qtext">${esc(rq.question)}</div>
  <div id="rch-${i}">${rch}</div>
  <button class="btn-confirm" id="rcbtn-${i}" onclick="submitRetry(${i})">確認する</button>
  <div class="rresult" id="rres-${i}">
    <div id="rbdg-${i}"></div>
    <div class="expl">${esc(rq.explanation)}</div>
  </div>
</div>
</div>`;
  });
  document.getElementById('qlist').innerHTML=h;
}
function submitAll(){
  const missing=QS.reduce((a,_,i)=>{if(!document.querySelector(`input[name="q${i}"]:checked`))a.push(i+1);return a;},[]);
  if(missing.length){alert(`問${missing.join('、')}がまだ答えていません！`);return;}
  let cor=0;
  const resList=[];
  QS.forEach((q,i)=>{
    const sv=parseInt(document.querySelector(`input[name="q${i}"]:checked`).value);
    const ok=sv===q.answer_index;
    if(ok)cor++;
    resList.push({num:i+1,subject:q.subject,field:q.field,correct:ok});
    document.querySelectorAll(`#ch-${i} .clabel`).forEach((l,li)=>{
      if(li===q.answer_index)l.classList.add('hl-ok');
      else if(li===sv&&!ok)l.classList.add('hl-ng');
    });
    document.querySelectorAll(`input[name="q${i}"]`).forEach(r=>r.disabled=true);
    document.getElementById(`bdg-${i}`).innerHTML=ok?
      '<span class="badge-ok">✓ 正解！</span>':
      `<span class="badge-ng">✗ 不正解（正解: ${LC[q.answer_index]}）</span>`;
    document.getElementById(`res-${i}`).style.display='block';
    document.getElementById(`card-${i}`).classList.add(ok?'ok':'ng');
    if(ok){const rb=document.getElementById(`rbtns-${i}`);if(rb)rb.style.display='none';}
  });
  const sc=document.getElementById('scorecard');
  sc.innerHTML=`<div class="score-num">${cor}<span style="font-size:.5em;color:#666"> / ${QS.length}</span></div><div class="score-sub">正解率 ${Math.round(cor/QS.length*100)}%</div><p style="margin-top:10px;color:#555;font-size:.88em">各問題の解説を確認してね！</p>`;
  sc.style.display='block';
  document.getElementById('subwrap').style.display='none';
  sc.scrollIntoView({behavior:'smooth'});
  sendResultsNotification(cor,resList);
}
function markOk(i){document.getElementById(`rbtns-${i}`).innerHTML='<span class="ok-msg">✓ 理解しました！</span>';}
function showRetry(i){
  document.getElementById(`retry-${i}`).style.display='block';
  document.getElementById(`rbtns-${i}`).style.display='none';
  document.getElementById(`retry-${i}`).scrollIntoView({behavior:'smooth'});
}
function submitRetry(i){
  const rq=QS[i].retry;
  const sel=document.querySelector(`input[name="rq${i}"]:checked`);
  if(!sel){alert('答えを選んでください！');return;}
  const sv=parseInt(sel.value);
  const ok=sv===rq.answer_index;
  document.querySelectorAll(`#rch-${i} .clabel`).forEach((l,li)=>{
    if(li===rq.answer_index)l.classList.add('hl-ok');
    else if(li===sv&&!ok)l.classList.add('hl-ng');
  });
  document.querySelectorAll(`input[name="rq${i}"]`).forEach(r=>r.disabled=true);
  document.getElementById(`rbdg-${i}`).innerHTML=ok?
    '<span class="badge-ok">✓ 正解！よくできました！</span>':
    `<span class="badge-ng">✗ 不正解（正解: ${LC[rq.answer_index]}）</span>`;
  document.getElementById(`rres-${i}`).style.display='block';
  document.getElementById(`rcbtn-${i}`).style.display='none';
}
function sendResultsNotification(cor,resList){
  if(!NOTIFY_URL)return;
  const payload=JSON.stringify({secret:NOTIFY_SECRET,type:'results',date:DATE_STR,score:cor,total:QS.length,results:resList,quiz_url:QUIZ_URL});
  fetch(NOTIFY_URL,{method:'POST',mode:'no-cors',body:payload}).catch(()=>{});
  if(cor===QS.length){
    const p=JSON.stringify({secret:NOTIFY_SECRET,type:'perfect',date:DATE_STR,total:QS.length,quiz_url:QUIZ_URL});
    setTimeout(()=>fetch(NOTIFY_URL,{method:'POST',mode:'no-cors',body:p}).catch(()=>{}),500);
  }
}
init();
</script>
