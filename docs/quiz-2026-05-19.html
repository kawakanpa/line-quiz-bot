on": "某書店でAのノート5冊とBのノート4冊を買うと620円になりました。また、Aのノート7冊とBのノート9冊を買うと1140円になりました。Aのノート1冊の値段をx円、Bのノート1冊の値段をy円とします。Aのノート1冊とBのノート1冊の値段の合計は何円か。", "choices": ["90", "100", "110", "120", "130"], "answer_index": 2, "explanation": "まず、Aのノート5冊とBのノート4冊の値段の合計は620円なので、5x + 4y = 620となります。また、Aのノート7冊とBのノート9冊の値段の合計は1140円なので、7x + 9y = 1140となります。これら2つの連立方程式を解くと、x = 50, y = 60となります。したがって、Aのノート1冊とBのノート1冊の値段の合計は50 + 60 = 110となります。", "retry": {"question": "某書店でAのノート5冊とBのノート4冊を買うと620円になりました。また、Aのノート7冊とBのノート9冊を買うと1140円になりました。Aのノート1冊の値段をx円、Bのノート1冊の値段をy円とします。Aのノート1冊とBのノート1冊の値段の合計は何円か。", "choices": ["90", "100", "110", "120", "130"], "answer_index": 2, "explanation": "まず、Aのノート5冊とBのノート4冊の値段の合計は620円なので、5x + 4y = 620となります。また、Aのノート7冊とBのノート9冊の値段の合計は1140円なので、7x + 9y = 1140となります。これら2つの連立方程式を解くと、x = 50, y = 60となります。したがって、Aのノート1冊とBのノート1冊の値段の合計は50 + 60 = 110となります。"}}, {"subject": "数学", "field": "p.12", "question": "次の式の計算結果はどれか。 2x²y × (-3xy) = ?", "choices": ["-6x³y²", "6x³y²", "-6x²y²", "6x²y²", "-2x²y²"], "answer_index": 2, "explanation": "2x²y × (-3xy) = -6x²x*y*y = -6x³y² となる。", "retry": {"question": "次の式の計算結果はどれか。 2x²y × (-3xy) = ?", "choices": ["-6x³y²", "6x³y²", "-6x²y²", "6x²y²", "-2x²y²"], "answer_index": 2, "explanation": "2x²y × (-3xy) = -6x²x*y*y = -6x³y² となる。"}}, {"subject": "数学", "field": "p.110", "question": "ある円柱の底面の半径を3倍にし、高さを2倍すると、体積はもとの円柱の何倍になるかを計算しなさい。", "choices": ["6倍", "12倍", "18倍", "20倍", "24倍"], "answer_index": 2, "explanation": "円柱の体積はV = πr²hで表されます。半径を3倍にし、高さを2倍にすると、新しい体積はV' = π(3r)²(2h) = 18πr²hになります。もとの体積V = πr²hと比較すると、新しい体積は18倍になることがわかります。", "retry": {"question": "ある円柱の底面の半径を3倍にし、高さを2倍すると、体積はもとの円柱の何倍になるかを計算しなさい。", "choices": ["6倍", "12倍", "18倍", "20倍", "24倍"], "answer_index": 2, "explanation": "円柱の体積はV = πr²hで表されます。半径を3倍にし、高さを2倍にすると、新しい体積はV' = π(3r)²(2h) = 18πr²hになります。もとの体積V = πr²hと比較すると、新しい体積は18倍になることがわかります。"}}, {"subject": "数学", "field": "p.22", "question": "次の連立方程式を加減法で解きましょう。x + 2y = 7 と x - 2y = -3 である。x の値は次のうちどれか。", "choices": ["1", "2", "3", "4", "5"], "answer_index": 1, "explanation": "加減法では、2つの方程式のyの係数が互いに逆の符号になっている場合は、2つの方程式を足すとyが消えます。x + 2y = 7 と x - 2y = -3 の2つの方程式を足すと、2x = 4 となり、x = 2 となります。", "retry": {"question": "次の連立方程式を加減法で解きましょう。x + 2y = 7 と x - 2y = -3 である。x の値は次のうちどれか。a. 1  b. 2  c. 3  d. 4  e. 5", "choices": [], "answer_index": 1, "explanation": "加減法では、2つの方程式のyの係数が互いに逆の符号になっている場合は、2つの方程式を足すとyが消えます。x + 2y = 7 と x - 2y = -3 の2つの方程式を足すと、2x = 4 となり、x = 2 となります。"}}, {"subject": "数学", "field": "p.197", "question": "次の連立方程式を加減法で解きなさい。\n2x + 3y = 7\nx - 2y = -3", "choices": ["x = 1, y = 2", "x = 2, y = 1", "x = 3, y = 1", "x = 1, y = 3", "x = 2, y = 3"], "answer_index": 0, "explanation": "2x + 3y = 7\nx - 2y = -3\n2倍してみる\n4x + 6y = 14\nx - 2y = -3\n4x + 6y + x - 2y = 14 - 3\n5x + 4y = 11\nx = 1, y = 2", "retry": {"question": "次の連立方程式を加減法で解きなさい。\n2x + 3y = 7\nx - 2y = -3", "choices": ["x = 1, y = 2", "x = 2, y = 1", "x = 3, y = 1", "x = 1, y = 3", "x = 2, y = 3"], "answer_index": 0, "explanation": "2x + 3y = 7\nx - 2y = -3\n2倍してみる\n4x + 6y = 14\nx - 2y = -3\n4x + 6y + x - 2y = 14 - 3\n5x + 4y = 11\nx = 1, y = 2"}}, {"subject": "数学", "field": "p.8", "question": "次の式の値を計算してください: (2x-5y)×3", "choices": ["6x-15y", "5x-2y", "6x-10y", "5x-15y", "6x-20y"], "answer_index": 0, "explanation": "まず括弧内の式を3倍します。つまり、2x×3=6x、5y×3=15yとなります。したがって、(2x-5y)×3=6x-15yとなります。", "retry": {"question": "次の式の値を計算してください: (2x-5y)×3", "choices": ["6x-15y", "5x-2y", "6x-10y", "5x-15y", "6x-20y"], "answer_index": 0, "explanation": "まず括弧内の式を3倍します。つまり、2x×3=6x、5y×3=15yとなります。したがって、(2x-5y)×3=6x-15yとなります。"}}, {"subject": "数学", "field": "p.6", "question": "次の式の和を求めましょう：(2x+3y)+(x-6y)。次の選択肢から正しい式を選びましょう。", "choices": ["3x-3y", "2x-2y", "3x-3y", "x-3y", "3x+3y"], "answer_index": 0, "explanation": "式の和を求めるには、同類項を結合します。同類項とは、変数の乗じられ方が同じである項です。したがって、(2x+3y)+(x-6y) = (2x+x) + (3y-6y) = 3x - 3y となります。", "retry": {"question": "次の式の和を求めましょう：(2x+3y)+(x-6y)。次の選択肢から正しい式を選びましょう。", "choices": ["3x-3y", "2x-2y", "3x-3y", "x-3y", "3x+3y"], "answer_index": 0, "explanation": "式の和を求めるには、同類項を結合します。同類項とは、変数の乗じられ方が同じである項です。したがって、(2x+3y)+(x-6y) = (2x+x) + (3y-6y) = 3x - 3y となります。"}}, {"subject": "数学", "field": "p.24", "question": "次の連立方程式を代入法で解いて、x の値を求めましょう。\n2x + y = 17\ny = x - 4", "choices": ["5", "7", "9", "11", "13"], "answer_index": 1, "explanation": "代入法を用いて解くためには、y = x - 4 を 2x + y = 17 に代入します。2x + (x - 4) = 17 となり、3x - 4 = 17、3x = 21、x = 7 となります。", "retry": {"question": "次の連立方程式を代入法で解いて、x の値を求めましょう。\n2x + y = 17\ny = x - 4", "choices": ["5", "7", "9", "11", "13"], "answer_index": 1, "explanation": "代入法を用いて解くためには、y = x - 4 を 2x + y = 17 に代入します。2x + (x - 4) = 17 となり、3x - 4 = 17、3x = 21、x = 7 となります。"}}, {"subject": "数学", "field": "p.4", "question": "次の式の次数を求めます: 2x² - 5x + 3", "choices": ["1", "2", "3", "4", "5"], "answer_index": 1, "explanation": "式の次数は、変数のべき乗の最大値です。この式の場合、x² のべき乗が最大なので、次数は 2 になります。", "retry": {"question": "次の式の次数を求めます: 2x² - 5x + 3", "choices": ["1", "2", "3", "4", "5"], "answer_index": 1, "explanation": "式の次数は、変数のべき乗の最大値です。この式の場合、x² のべき乗が最大なので、次数は 2 になります。"}}, {"subject": "数学", "field": "p.16", "question": "太郎君は、x = 4、y = -6 のとき、式の値を求めます。式は 2x² + y です。式の値は次のうちどれですか?", "choices": ["14", "22", "26", "30", "34"], "answer_index": 2, "explanation": "式 2x² + y の値を求めるには、x = 4、y = -6 を式に代入します。2(4)² + (-6) = 2(16) - 6 = 32 - 6 = 26 です。", "retry": {"question": "太郎君は、x = 4、y = -6 のとき、式の値を求めます。式は 2x² + y です。式の値は次のうちどれですか?", "choices": ["14", "22", "26", "30", "34"], "answer_index": 2, "explanation": "式 2x² + y の値を求めるには、x = 4、y = -6 を式に代入します。2(4)² + (-6) = 2(16) - 6 = 32 - 6 = 26 です。"}}, {"subject": "数学", "field": "p.20", "question": "ある学校の体育館の床は、長さl、幅aの長方形です。体育館の床にタイルを敷き詰める場合、タイル1枚の面積は1m²です。体育館の床の面積Sは、S = laと表されます。ここで、l = 2a + 3です。体育館の床の面積Sについて、aで表してください。", "choices": ["S = 2a² + 3a", "S = 2a² - 3a", "S = a² + 3a", "S = a² - 3a", "S = 3a² + 2a"], "answer_index": 0, "explanation": "l = 2a + 3をS = laに代入すると、S = (2a + 3)a = 2a² + 3aとなります。", "retry": {"question": "ある学校の体育館の床は、長さl、幅aの長方形です。体育館の床にタイルを敷き詰める場合、タイル1枚の面積は1m²です。体育館の床の面積Sは、S = laと const LC=['a','b','c','d','e'];
const NOTIFY_URL='https://script.google.com/macros/s/AKfycbyOa4De8zupkRe0tXU3lz18tWkPG4jg2HdVgUhFC_BnYrUDPqlvKCAS4Y4ccfEj8KWi/exec';
const NOTIFY_SECRET='yuukeibotquiz2026';
const DATE_STR='2026年5月19日(火)';
const QUIZ_URL='https://kawakanpa.github.io/line-quiz-bot/quiz-2026-05-19.html';
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function init(){
  let h='';
  QS.forEach((q,i)=>{
    const ch=q.choices.map((c,ci)=>`<label class="clabel" id="lbl-${i}-${ci}"><input type="radio" name="q${i}" value="${ci}"><span>${LC[ci]}. ${esc(c)}</span></label>`).join('');
    const rq=q.retry;
    const rch=rq.choices.map((c,ci)=>`<label class="clabel" id="rlbl-${i}-${ci}"><input type="radio" name="rq${i}" value="${ci}"><span>${LC[ci]}. ${esc(c)}</span></label>`).join('');
    h+=`<div class="qcard" id="card-${i}">
<div class="qhead"><span class="qnum">問${i+1}</span><span class="tag">${esc(q.subject)} / ${esc(q.field)}</span></div>
<div class="qtext">${esc(q.question)}</div>
<div id="ch-${i}">${ch}</div>
<div class="resarea" id="res-${i}">
  <div id="bdg-${i}"></div>
  <div class="expl">${esc(q.explanation)}</div>
  <div class="rbtns" id="rbtns-${i}">
    <button class="btn btn-retry" onclick="showRetry(${i})">わかった！練習問題を解く 🔄</button>
  </div>
</div>
<div class="retrybox" id="retry-${i}">
  <h4>🔄 もう一度チャレンジ！</h4>
  <div class="qtext">${esc(rq.question)}</div>
  <div id="rch-${i}">${rch}</div>
  <button class="btn-confirm" id="rcbtn-${i}" onclick="submitRetry(${i})">確認する</button>
  <div class="rresult" id="rres-${i}">
    <div id="rbdg-${i}"></div>
    <div class="expl">${esc(rq.explanation)}</div>
  </div>
</div>
</div>`;
  });
  document.getElementById('qlist').innerHTML=h;
}
function submitAll(){
  const missing=QS.reduce((a,_,i)=>{if(!document.querySelector(`input[name="q${i}"]:checked`))a.push(i+1);return a;},[]);
  if(missing.length){alert(`問${missing.join('、')}がまだ答えていません！`);return;}
  let cor=0;
  const resList=[];
  QS.forEach((q,i)=>{
    const sv=parseInt(document.querySelector(`input[name="q${i}"]:checked`).value);
    const ok=sv===q.answer_index;
    if(ok)cor++;
    resList.push({num:i+1,subject:q.subject,field:q.field,correct:ok});
    document.querySelectorAll(`#ch-${i} .clabel`).forEach((l,li)=>{
      if(li===q.answer_index)l.classList.add('hl-ok');
      else if(li===sv&&!ok)l.classList.add('hl-ng');
    });
    document.querySelectorAll(`input[name="q${i}"]`).forEach(r=>r.disabled=true);
    document.getElementById(`bdg-${i}`).innerHTML=ok?
      '<span class="badge-ok">✓ 正解！</span>':
      `<span class="badge-ng">✗ 不正解（正解: ${LC[q.answer_index]}）</span>`;
    document.getElementById(`res-${i}`).style.display='block';
    document.getElementById(`card-${i}`).classList.add(ok?'ok':'ng');
    if(ok){const rb=document.getElementById(`rbtns-${i}`);if(rb)rb.style.display='none';}
  });
  const sc=document.getElementById('scorecard');
  const isPerfect=cor===QS.length;
  const topMsg=isPerfect?'🎉 全問正解！':'✅ 回答完了！';
  sc.innerHTML=`<div style="font-size:1.4em;font-weight:700;color:#2e7d32;margin-bottom:8px">${topMsg}</div><div class="score-num">${cor}<span style="font-size:.5em;color:#666"> / ${QS.length}</span></div><div class="score-sub">正解率 ${Math.round(cor/QS.length*100)}%</div><p style="margin-top:10px;color:#555;font-size:.88em">各問題の解説を確認してね！</p>`;
  sc.style.display='block';
  document.getElementById('subwrap').style.display='none';
  sc.scrollIntoView({behavior:'smooth'});
  sendResultsNotification(cor,resList);
}
function markOk(i){document.getElementById(`rbtns-${i}`).innerHTML='<span class="ok-msg">✓ 理解しました！</span>';}
function showRetry(i){
  document.getElementById(`retry-${i}`).style.display='block';
  document.getElementById(`rbtns-${i}`).style.display='none';
  document.getElementById(`retry-${i}`).scrollIntoView({behavior:'smooth'});
}
function submitRetry(i){
  const rq=QS[i].retry;
  const sel=document.querySelector(`input[name="rq${i}"]:checked`);
  if(!sel){alert('答えを選んでください！');return;}
  const sv=parseInt(sel.value);
  const ok=sv===rq.answer_index;
  document.querySelectorAll(`#rch-${i} .clabel`).forEach((l,li)=>{
    if(li===rq.answer_index)l.classList.add('hl-ok');
    else if(li===sv&&!ok)l.classList.add('hl-ng');
  });
  document.querySelectorAll(`input[name="rq${i}"]`).forEach(r=>r.disabled=true);
  document.getElementById(`rbdg-${i}`).innerHTML=ok?
    '<span class="badge-ok">✓ 正解！よくできました！</span>':
    `<span class="badge-ng">✗ 不正解（正解: ${LC[rq.answer_index]}）</span>`;
  document.getElementById(`rres-${i}`).style.display='block';
  document.getElementById(`rcbtn-${i}`).style.display='none';
}
function sendResultsNotification(cor,resList){
  if(!NOTIFY_URL)return;
  const payload=JSON.stringify({secret:NOTIFY_SECRET,type:'results',date:DATE_STR,score:cor,total:QS.length,results:resList,quiz_url:QUIZ_URL});
  fetch(NOTIFY_URL,{method:'POST',mode:'no-cors',body:payload}).catch(()=>{});
  if(cor===QS.length){
    const p=JSON.stringify({secret:NOTIFY_SECRET,type:'perfect',date:DATE_STR,total:QS.length,quiz_url:QUIZ_URL});
    setTimeout(()=>fetch(NOTIFY_URL,{method:'POST',mode:'no-cors',body:p}).catch(()=>{}),500);
  }
}
init();
</script>
