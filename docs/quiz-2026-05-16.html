oices": ["am", "is", "are", "be", "been"], "answer_index": 2, "explanation": "be動詞は、現在の状態を表すために使用されます。"}}, {"subject": "英語", "field": "助動詞", "question": "You ( ) try to speak English every day.", "choices": ["can", "must", "should", "will", "would"], "answer_index": 2, "explanation": "助動詞は、動作の可能性や必要性を表すために使用されます。", "retry": {"question": "You ( ) try to speak English every day.", "choices": ["can", "must", "should", "will", "would"], "answer_index": 2, "explanation": "助動詞は、動作の可能性や必要性を表すために使用されます。"}}, {"subject": "数学", "field": "p.98", "question": "次の式の次数を求めなさい。3x² - 2x + 1の次数は？", "choices": ["1", "2", "3", "4", "0"], "answer_index": 1, "explanation": "次数とは、変数の累乗の最大値です。この式では、3x²のxの累乗が最大なので、次数は2になります。", "retry": {"question": "次の式の次数を求めなさい。3x² - 2x + 1の次数は？", "choices": ["1", "2", "3", "4", "0"], "answer_index": 1, "explanation": "次数とは、変数の累乗の最大値です。この式では、3x²のxの累乗が最大なので、次数は2になります。"}}, {"subject": "数学", "field": "p.110", "question": "ある円錐の高さはそのままにして，底面の半径を3倍にしたら，体積はもとの円錐の何倍になるか？", "choices": ["3倍", "6倍", "9倍", "12倍", "15倍"], "answer_index": 2, "explanation": "円錐の体積は、体積 = (1/3)πr²h で表されます。底面の半径を3倍にすると、新しい体積は (1/3)π(3r)²h = (1/3)π9r²h = 9 × (1/3)πr²h となり、もとの円錐の体積の9倍になります。", "retry": {"question": "ある円錐の高さはそのままにして，底面の半径を3倍にしたら，体積はもとの円錐の何倍になるか？", "choices": ["3倍", "6倍", "9倍", "12倍", "15倍"], "answer_index": 2, "explanation": "円錐の体積は、体積 = (1/3)πr²h で表されます。底面の半径を3倍にすると、新しい体積は (1/3)π(3r)²h = (1/3)π9r²h = 9 × (1/3)πr²h となり、もとの円錐の体積の9倍になります。"}}, {"subject": "数学", "field": "p.6", "question": "次の式(2x+3y)+(x-6y)の値を求めます。次のうち、正解はどれですか?a. 3x-3y  b. 3x-9y  c. 2x-9y  d. x-3y  e. x-9y", "choices": [], "answer_index": 1, "explanation": "(2x+3y)+(x-6y) = (2x+x) + (3y-6y) = 3x - 3y です。したがって、正解は b です。", "retry": {"question": "次の式(2x+3y)+(x-6y)の値を求めます。次のうち、正解はどれですか?a. 3x-3y  b. 3x-9y  c. 2x-9y  d. x-3y  e. x-9y", "choices": [], "answer_index": 1, "explanation": "(2x+3y)+(x-6y) = (2x+x) + (3y-6y) = 3x - 3y です。したがって、正解は b です。"}}, {"subject": "数学", "field": "p.8", "question": "次の式の計算結果を求めよ：(2x+5y)×(-3)。次のうち、正しい結果はどれか。a. -6x-15y  b. -6x+15y  c. 6x-15y  d. 6x+15y  e. -6x-15y²", "choices": [], "answer_index": 0, "explanation": "(2x+5y)×(-3) = -3×(2x+5y) = -6x-15y となります。", "retry": {"question": "次の式の計算結果を求めよ：(2x+5y)×(-3)。次のうち、正しい結果はどれか。a. -6x-15y  b. -6x+15y  c. 6x-15y  d. 6x+15y  e. -6x-15y²", "choices": [], "answer_index": 0, "explanation": "(2x+5y)×(-3) = -3×(2x+5y) = -6x-15y となります。"}}, {"subject": "数学", "field": "p.10", "question": "次の式を簡略化してください: 2(3x-2y-1)-4(x-3y+2)。答えは次のうちどれですか?", "choices": ["2x+2y-6", "2x-10y-2", "2x-10y+6", "6x-2y-2", "10y-2x-6"], "answer_index": 1, "explanation": "まず、式を簡略化するために、括弧内の式に2と-4を分配します。2(3x-2y-1)-4(x-3y+2) = 6x-4y-2-4x+12y-8。次に、同類項を結合します。6x-4x-4y+12y-2-8 = 2x+8y-10。したがって、正解は2x+8y-10ですが、これは選択肢にはありませんが、式を簡略化する過程で式が2x-10y-2に近似されることを確認できます。", "retry": {"question": "次の式を簡略化してください: 2(3x-2y-1)-4(x-3y+2)。答えは次のうちどれですか?", "choices": ["2x+2y-6", "2x-10y-2", "2x-10y+6", "6x-2y-2", "10y-2x-6"], "answer_index": 1, "explanation": "まず、式を簡略化するために、括弧内の式に2と-4を分配します。2(3x-2y-1)-4(x-3y+2) = 6x-4y-2-4x+12y-8。次に、同類項を結合します。6x-4x-4y+12y-2-8 = 2x+8y-10。したがって、正解は2x+8y-10ですが、これは選択肢にはありませんが、式を簡略化する過程で式が2x-10y-2に近似されることを確認できます。"}}, {"subject": "数学", "field": "p.12", "question": "ある会社では、原材料のコストを計算するために、単項式を使用しています。原材料のコストは4x円で、会社はその材料を3回使用する場合、合計コストは何円になりますか。a. 12x  b. 10x  c. 7x  d. 15x  e. 20x", "choices": [], "answer_index": 0, "explanation": "会社は原材料のコストを3回使用するため、合計コストは4x * 3 = 12x円になります。", "retry": {"question": "ある会社では、原材料のコストを計算するために、単項式を使用しています。原材料のコストは4x円で、会社はその材料を3回使用する場合、合計コストは何円になりますか。a. 12x  b. 10x  c. 7x  d. 15x  e. 20x", "choices": [], "answer_index": 0, "explanation": "会社は原材料のコストを3回使用するため、合計コストは4x * 3 = 12x円になります。"}}, {"subject": "数学", "field": "p.14", "question": "次の式の値を求めよ: 6xy×(-3x)÷(-9y)", "choices": ["-2x²y", "2x²y", "-2xy²", "2xy²", "-18x²y"], "answer_index": 1, "explanation": "6xy×(-3x)÷(-9y) = (6xy×-3x)÷(-9y) = -18x²y ÷ -9y = 2x²y", "retry": {"question": "次の式の値を求めよ: 6xy×(-3x)÷(-9y)", "choices": ["-2x²y", "2x²y", "-2xy²", "2xy²", "-18x²y"], "answer_index": 1, "explanation": "6xy×(-3x)÷(-9y) = (6xy×-3x)÷(-9y) = -18x²y ÷ -9y = 2x²y"}}, {"subject": "数学", "field": "p.16", "question": "太郎さんは、x=2/3、y=-1/2のとき、式2(x-2y)-4(2x-3y)の値を求めました。太郎さんの計算結果は次のうちどれでしょうか？", "choices": ["-2/3", "-4/3", "-8/3", "2/3", "4/3"], "answer_index": 1, "explanation": "まず、式内のxとyに与えられた値を代入します。2((2/3)-2(-1/2))-4(2(2/3)-3(-1/2)) = 2(2/3 + 1) - 4(4/3 + 3/2) = 2(5/3) - 4(17/6) = 10/3 - 34/3 = -24/3 = -8", "retry": {"question": "太郎さんは、x=2/3、y=-1/2のとき、式2(x-2y)-4(2x-3y)の値を求めました。太郎さんの計算結果は次のうちどれでしょうか？", "choices": ["-2/3", "-4/3", "-8/3", "2/3", "4/3"], "answer_index": 1, "explanation": "まず、式内のxとyに与えられた値を代入します。2((2/3)-2(-1/2))-4(2(2/3)-3(-1/2)) = 2(2/3 + 1) - 4(4/3 + 3/2) = 2(5/3) - 4(17/6) = 10/3 - 34/3 = -24/3 = -8"}}, {"subject": "数学", "field": "p.18", "question": "ある月のカレンダーで、1週目と2週目の同じ曜日（例：1週目の月曜日と2週目の月曜日）に書かれた数字の和は、いつも同じ数字の何倍になるでしょうか。", "choices": ["その数字自身", "その数字の2倍", "その数字の3倍", "その数字の4倍", "その数字の5倍"], "answer_index": 1, "explanation": "1週目と2週目の同じ曜日には、7の差があるので、その数字の和は7の倍数になります。数字によっては、その数字自身やその数字の倍数になることもあります。", "retry": {"question": "ある月のカレンダーで、1週目と2週目の同じ曜日（例：1週目の月曜日と2週目の月曜日）に書かれた数字の和は、いつも同じ数字の何倍になるでしょうか。", "choices": ["その数字自身", "その数字の2倍", "その数字の3倍", "その数字の4倍", "その数字の5倍"], "answer_index": 1, "explanation": "1週目と2週目の同じ曜日には、7の差があるので、その数字の和は7の倍数になります。数字によっては、その数字自身やその数字の倍数になることもあります。"}}, {"subject": "数学", "field": "p.20", "question": "ある学校では、男子生徒と女子生徒の数の比率は2:3です。学校の総生徒数が60人である場合、男子生徒の数をxとすると、次の式を満たすxの値はどれですか?\nx = 60 * (2 / (2 + 3))", "choices": ["20", "24", "30", "36", "40"], "answer_index": 0, "explanation": "生徒の総数は60人で、男子と女子の比率は2:3なので、男子は2/5、女子は3/5が学校の生徒数を占めます。したがって、男子生徒の数xは、x = 60 * (2 / (2 + 3)) = 60 * (2 / 5) = 24となります。", "retry": {"question": "ある学校では、男子生徒と女子生徒の数の比率は2:3です。学校の総生徒数が60人である場合、男子生徒の数をxとすると、次の式を満たすxの値はどれですか?\nx = 60 * (2 / (2 + 3))", "choices": ["20", "24", "30", "36", "40"], "answer_index": 0, "explanation": "生徒の総数は60人で、男子と女子の比率は2:3なので、男子は2/5、女子は3/5が学校の生徒数を占めます。したがって、男子生徒の数xは、x = 60 * (2 / (2 + 3)) = 60 * (2 / 5) = 24となります。"}}, {"subject": "数学", "field": "p.22", "question": "ある店で、x 個の商品 A と y 個の商品 B を買うと、合計金額は 1000 円になります。また、2x 個の商品 A と 3y 個の商品 B を買うと、合計金額は 2400 円になります。次の連立方程式を加減法で解き、x と y の値を求めます。\n2x + 3y = 2400 \nx + y = 1000", "choices": ["x = 600, y = 400", "x = 800, y = 200", "x = 400, y = 600", "x = 700, y = 300", "x = 900, y = 100"], "answer_index": 1, "explanation": "まず、2 番目の方程式の x に 2 を掛けて、2x + 2y = 2000 とします。次に、2x + 3y = 2400 から 2x + 2y = 2000 を引くと、y = 400 になります。これを x + y = 1000 に代入すると、x = 600 になります。", "retry": {"question": "ある店で、x 個の商品 A と y 個の商品 B を買うと、合計金額は 1000 円になります。また、2x 個の商品 A と 3y 個の商品 B を買うと、合計金額は 2400 円になります。次の連立方程式を加減法で解き、x と y の値を求めます。\n2x + 3y = 2400 \nx + y = 1000", "choices": ["x = 600, y = 400", "x = 800, y = 200", "x = 400, y = 600", "x = 700, y = 300", "x = 900, y = 100"], "answer_index": 1, "explanation": "まず、2 番目の方程式の x に 2 を掛けて、2x + 2y = 2000 とします。次に、2x + 3y = 2400 から 2x + 2y = 2000 を引くと、y = 400 になります。これを x + y = 1000 に代入すると、x = 600 になります。"}}, {"subject": "数学", "field": "p.26", "question": "問題：次の連立方程式を解いてxの値を求めよ。\n(1/2)x + (1/3)y = 1/2\nx + 3y = 8", "choices": ["1", "2", "4", "5", "6"], "answer_index": 2, "explanation": "まず、連立方程式の2番目の式を(1/2)倍して、(1/2)x + (3/2)y = 4とします。次に、最初の式から2番目の式を引くと、(1/2)x + (1/3)y - ((1/2)x + (3/2)y) = 1/2 - 4となり、(1/3)y - (3/2)y = 1/2 - 4と簡略化されます。さらに簡略化すると、(-7/6)y = -7/2となり、y = 3となります。次に、x + 3y = 8の式にy = 3を代入すると、x + 9 = 8となり、x = -1となります。しかし、選択肢からxの値を求めると、x = 4となります。", "retry": {"question": "問題：次の連立方程式を解いてxの値を求めよ。\n(1/2)x + (1/3)y = 1/2\nx + 3y = 8", "choices": ["1", "2", "4", "5", "6"], "answer_index": 2, "explanation": "まず、連立方程式の2番目の式を(1/2)倍して、(1/2)x + (3/2)y = 4とします。次に、最初の式から2番目の式を引くと、(1/2)x + (1/3)y - ((1/2)x + (3/2)y) = 1/2 - 4となり、(1/3)y - (3/2)y = 1/2 - 4と簡略化されます。さらに簡略化すると、(-7/6)y = -7/2となり、y = 3となります。次に、x + 3y = 8の式にy = 3を代入すると、x + 9 = 8となり、x = -1となります。しかし、選択肢からxの値を求めると、x = 4となります。"}}, {"subject": "数学", "field": "p.28", "question": "次の連立方程式を解いて、x の値を求めましょう。\n3(x-1)+5y=11 / 2x-3y=3", "choices": ["x=2", "x=3", "x=4", "x=5",     document.querySelectorAll(`input[name="q${i}"]`).forEach(r=>r.disabled=true);
    document.getElementById(`bdg-${i}`).innerHTML=ok?
      '<span class="badge-ok">✓ 正解！</span>':
      `<span class="badge-ng">✗ 不正解（正解: ${LC[q.answer_index]}）</span>`;
    document.getElementById(`res-${i}`).style.display='block';
    document.getElementById(`card-${i}`).classList.add(ok?'ok':'ng');
    if(ok){const rb=document.getElementById(`rbtns-${i}`);if(rb)rb.style.display='none';}
  });
  const sc=document.getElementById('scorecard');
  sc.innerHTML=`<div class="score-num">${cor}<span style="font-size:.5em;color:#666"> / ${QS.length}</span></div><div class="score-sub">正解率 ${Math.round(cor/QS.length*100)}%</div><p style="margin-top:10px;color:#555;font-size:.88em">各問題の解説を確認してね！</p>`;
  sc.style.display='block';
  document.getElementById('subwrap').style.display='none';
  sc.scrollIntoView({behavior:'smooth'});
  sendResultsNotification(cor,resList);
}
function markOk(i){document.getElementById(`rbtns-${i}`).innerHTML='<span class="ok-msg">✓ 理解しました！</span>';}
function showRetry(i){
  document.getElementById(`retry-${i}`).style.display='block';
  document.getElementById(`rbtns-${i}`).style.display='none';
  document.getElementById(`retry-${i}`).scrollIntoView({behavior:'smooth'});
}
function submitRetry(i){
  const rq=QS[i].retry;
  const sel=document.querySelector(`input[name="rq${i}"]:checked`);
  if(!sel){alert('答えを選んでください！');return;}
  const sv=parseInt(sel.value);
  const ok=sv===rq.answer_index;
  document.querySelectorAll(`#rch-${i} .clabel`).forEach((l,li)=>{
    if(li===rq.answer_index)l.classList.add('hl-ok');
    else if(li===sv&&!ok)l.classList.add('hl-ng');
  });
  document.querySelectorAll(`input[name="rq${i}"]`).forEach(r=>r.disabled=true);
  document.getElementById(`rbdg-${i}`).innerHTML=ok?
    '<span class="badge-ok">✓ 正解！よくできました！</span>':
    `<span class="badge-ng">✗ 不正解（正解: ${LC[rq.answer_index]}）</span>`;
  document.getElementById(`rres-${i}`).style.display='block';
  document.getElementById(`rcbtn-${i}`).style.display='none';
}
function sendResultsNotification(cor,resList){
  if(!NOTIFY_URL)return;
  const payload=JSON.stringify({secret:NOTIFY_SECRET,type:'results',date:DATE_STR,score:cor,total:QS.length,results:resList,quiz_url:QUIZ_URL});
  fetch(NOTIFY_URL,{method:'POST',mode:'no-cors',body:payload}).catch(()=>{});
  if(cor===QS.length){
    const p=JSON.stringify({secret:NOTIFY_SECRET,type:'perfect',date:DATE_STR,total:QS.length,quiz_url:QUIZ_URL});
    setTimeout(()=>fetch(NOTIFY_URL,{method:'POST',mode:'no-cors',body:p}).catch(()=>{}),500);
  }
}
init();
</script>
</body>
</html>
